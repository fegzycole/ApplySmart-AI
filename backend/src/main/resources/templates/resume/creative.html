<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Resume</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 11pt;
            line-height: 1.5;
            color: #1a1a1a;
            background: white;
        }

        .container {
            max-width: 8.5in;
            margin: 0 auto;
        }

        /* Header Section with Accent Bar */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 35px 0.75in;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32pt;
            font-weight: 900;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .contact-info {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            font-size: 10pt;
            opacity: 0.95;
        }

        .contact-info span {
            display: inline-block;
        }

        /* Main Content */
        .content {
            padding: 0 0.75in 0.5in 0.75in;
        }

        /* Section Styles */
        .section {
            margin-bottom: 28px;
        }

        .section-title {
            font-size: 15pt;
            font-weight: 800;
            color: #667eea;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            padding-left: 15px;
        }

        .section-title::before {
            content: "";
            position: absolute;
            left: 0;
            top: 3px;
            width: 5px;
            height: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }

        /* Summary */
        .summary {
            font-size: 11pt;
            line-height: 1.7;
            color: #444;
            padding: 15px;
            background: #f8f9ff;
            border-left: 4px solid #667eea;
            border-radius: 4px;
        }

        /* Work Experience */
        .experience-item {
            margin-bottom: 20px;
            padding: 15px;
            background: #fafafa;
            border-radius: 6px;
            page-break-inside: avoid;
        }

        .experience-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .position {
            font-size: 13pt;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        .company {
            font-size: 11pt;
            font-weight: 600;
            color: #667eea;
        }

        .experience-meta {
            text-align: right;
        }

        .date {
            font-size: 10pt;
            color: #666;
            font-weight: 700;
            background: white;
            padding: 4px 10px;
            border-radius: 12px;
            display: inline-block;
        }

        .location {
            font-size: 9.5pt;
            color: #888;
            margin-top: 2px;
        }

        .responsibilities {
            margin-left: 20px;
            margin-top: 10px;
        }

        .responsibilities li {
            margin-bottom: 6px;
            line-height: 1.6;
            font-size: 10.5pt;
            color: #444;
        }

        /* Education */
        .education-item {
            margin-bottom: 18px;
            padding: 12px 15px;
            background: #f8f9ff;
            border-left: 4px solid #764ba2;
            border-radius: 4px;
            page-break-inside: avoid;
        }

        .education-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .degree {
            font-size: 12pt;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        .institution {
            font-size: 11pt;
            color: #667eea;
            font-weight: 600;
        }

        .education-meta {
            text-align: right;
        }

        .gpa {
            font-size: 10pt;
            color: #666;
            margin-top: 4px;
            font-weight: 600;
        }

        /* Skills */
        .skills-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .skill {
            display: inline-block;
            padding: 8px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px;
            font-size: 10pt;
            font-weight: 600;
            box-shadow: 0 2px 4px rgba(102, 126, 234, 0.2);
        }

        /* Certifications */
        .certification-item {
            margin-bottom: 10px;
            padding: 8px 12px;
            background: #fafafa;
            border-radius: 4px;
            font-size: 10.5pt;
            color: #444;
        }

        .certification-item strong {
            color: #1a1a1a;
            font-weight: 700;
        }

        /* Projects */
        .project-item {
            margin-bottom: 18px;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 6px;
            border-left: 4px solid #667eea;
            page-break-inside: avoid;
        }

        .project-name {
            font-size: 12pt;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 6px;
        }

        .project-description {
            font-size: 10.5pt;
            color: #444;
            margin-bottom: 8px;
            line-height: 1.6;
        }

        .technologies {
            font-size: 10pt;
            color: #666;
            margin-bottom: 4px;
        }

        .technologies strong {
            color: #667eea;
            font-weight: 700;
        }

        .project-link {
            font-size: 9.5pt;
            color: #764ba2;
            font-weight: 600;
        }

        /* Print Optimization */
        @media print {
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Header -->
    <div class="header">
        <h1>{{name}}</h1>
        <div class="contact-info">
            <span>{{email}}</span>
            <span>{{phone}}</span>
            <span>{{location}}</span>
            <span>{{linkedin}}</span>
            <span>{{github}}</span>
            <span>{{website}}</span>
        </div>
    </div>

    <div class="content">
        <!-- Summary -->
        <div class="section">
            <h2 class="section-title">About Me</h2>
            <p class="summary">{{summary}}</p>
        </div>

        <!-- Work Experience -->
        <div class="section">
            <h2 class="section-title">Experience</h2>
            {{work_experience}}
        </div>

        <!-- Education -->
        <div class="section">
            <h2 class="section-title">Education</h2>
            {{education}}
        </div>

        <!-- Skills -->
        <div class="section">
            <h2 class="section-title">Skills</h2>
            <div class="skills-container">
                {{skills}}
            </div>
        </div>

        <!-- Certifications -->
        <div class="section">
            <h2 class="section-title">Certifications</h2>
            {{certifications}}
        </div>

        <!-- Projects -->
        <div class="section">
            <h2 class="section-title">Projects</h2>
            {{projects}}
        </div>
    </div>
</div>
</body>
</html>
