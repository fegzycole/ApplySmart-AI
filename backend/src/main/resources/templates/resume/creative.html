<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Resume</title>
    <style>
        @page {
            size: Letter;
            margin: 0.5in;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            color: #0f172a;
            font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
            line-height: 1.5;
        }

        .container {
            width: auto;
            min-height: 0;
            margin: 0;
            padding: 0;
            background: #ffffff;
        }

        .header {
            margin-bottom: 40px;
            padding-bottom: 32px;
            position: relative;
        }

        .header h1 {
            margin-bottom: 8px;
            font-size: 42pt;
            font-weight: 900;
            line-height: 1;
            letter-spacing: -0.05em;
            color: #0ea5e9;
            background: linear-gradient(90deg, #0ea5e9, #2563eb);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .contact-info {
            display: flex;
            flex-wrap: wrap;
            column-gap: 24px;
            row-gap: 0;
            font-size: 10.5pt;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.14em;
        }

        .contact-item {
            display: block;
            white-space: nowrap;
        }

        .section {
            margin-bottom: 18px;
        }

        .section:last-child {
            margin-bottom: 0;
        }

        .section-title {
            position: relative;
            display: inline-block;
            margin-bottom: 24px;
            font-size: 16pt;
            line-height: 1.25;
            font-weight: 900;
            color: #0f172a;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            page-break-after: avoid;
            page-break-inside: avoid;
        }

        .section-title::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -8px;
            width: 48px;
            height: 6px;
            background: #0ea5e9;
        }

        .section-title + .summary,
        .section-title + .skills-container,
        .section-title + .experience-item,
        .section-title + .education-item,
        .section-title + .certification-item,
        .section-title + .project-item {
            page-break-before: avoid;
        }

        .summary {
            margin-bottom: 0;
            font-size: 11.5pt;
            line-height: 1.625;
            font-weight: 500;
            color: #334155;
            white-space: pre-wrap;
            overflow-wrap: break-word;
        }

        .education-item,
        .project-item {
            break-inside: avoid;
            page-break-inside: avoid;
        }

        .experience-item {
            margin-bottom: 32px;
            padding-left: 32px;
            border-left: 4px solid #e2e8f0;
        }

        .experience-item:last-child,
        .education-item:last-child,
        .certification-item:last-child,
        .project-item:last-child {
            margin-bottom: 0;
        }

        .experience-header {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            break-inside: avoid;
            page-break-inside: avoid;
            break-after: avoid;
            page-break-after: avoid;
            margin-bottom: 12px;
        }

        .position {
            margin-bottom: 0;
            font-size: 14pt;
            line-height: 1.333333;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.02em;
        }

        .company {
            margin-top: 4px;
            font-size: 12pt;
            font-weight: 900;
            color: #0ea5e9;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .date {
            margin-top: 8px;
            font-size: 10pt;
            font-weight: 900;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.14em;
        }

        .location {
            font-size: 10pt;
            font-weight: 700;
            color: #64748b;
        }

        .responsibilities {
            list-style: none;
        }

        .responsibilities li {
            margin-bottom: 12px;
            font-size: 11pt;
            line-height: 1.625;
            font-weight: 500;
            color: #475569;
        }

        .responsibilities li:last-child {
            margin-bottom: 0;
        }

        .responsibilities li::before {
            content: "\2192";
            margin-right: 12px;
            color: #0ea5e9;
            font-weight: 900;
        }

        .education-item {
            margin-bottom: 24px;
        }

        .education-header {
            display: block;
            width: 100%;
        }

        .education-primary,
        .education-meta {
            vertical-align: top;
        }

        .education-primary {
            min-width: 0;
        }

        .education-meta {
            text-align: right;
            white-space: nowrap;
            margin-left: 16px;
        }

        .degree {
            margin-bottom: 0;
            font-size: 13pt;
            line-height: 1.333333;
            font-weight: 800;
            color: #0f172a;
        }

        .institution {
            font-size: 11.5pt;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .gpa {
            margin-top: 8px;
            font-size: 10pt;
            font-weight: 900;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.14em;
        }

        .skills-container {
            display: flex;
            flex-wrap: wrap;
            margin: 0 -12px -12px 0;
        }

        .skill {
            display: inline-block;
            margin: 0 12px 12px 0;
            padding: 8px 20px;
            border: 2px solid #bae6fd;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(14,165,233,0.1), rgba(37,99,235,0.1));
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
            color: #0369a1;
            font-size: 10pt;
            font-weight: 900;
            line-height: 1.2;
        }

        .certification-item {
            margin-bottom: 12px;
            font-size: 11pt;
            line-height: 1.625;
            font-weight: 500;
            color: #475569;
        }

        .certification-item strong {
            color: #0f172a;
            font-weight: 800;
        }

        .project-item {
            margin-bottom: 20px;
        }

        .project-name {
            font-size: 13pt;
            font-weight: 800;
            color: #0f172a;
        }

        .project-description {
            margin-top: 8px;
            font-size: 11pt;
            line-height: 1.625;
            font-weight: 500;
            color: #475569;
        }

        .technologies,
        .project-link {
            margin-top: 8px;
            font-size: 10pt;
            line-height: 1.5;
            color: #64748b;
        }

        .technologies strong {
            color: #0ea5e9;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>{{name}}</h1>
        <div class="contact-info">{{contact_entries}}</div>
    </div>

    {{summary_section}}
    {{work_experience_section}}
    {{education_section}}
    {{skills_section}}
    {{certifications_section}}
    {{projects_section}}
</div>
</body>
</html>
