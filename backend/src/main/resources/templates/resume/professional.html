<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Resume</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 11pt;
            line-height: 1.5;
            color: #000;
            background: white;
        }

        .container {
            max-width: 8.5in;
            margin: 0 auto;
            padding: 0.3in 0.3in;
        }

        /* Header Section */
        .header {
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #000;
        }

        .header h1 {
            font-size: 24pt;
            font-weight: 700;
            color: #000;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .contact-info {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 10pt;
            color: #333;
        }

        .contact-item {
            display: inline-flex;
            align-items: center;
            white-space: nowrap;
        }

        /* Section Styles */
        .section {
            margin-bottom: 18px;
        }

        .section:last-child {
            margin-bottom: 0;
        }

        .section-title {
            font-size: 13pt;
            font-weight: 700;
            color: #000;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-bottom: 1px solid #333;
            padding-bottom: 3px;
        }

        /* Summary */
        .summary {
            font-size: 10.5pt;
            line-height: 1.6;
            color: #333;
            text-align: justify;
            font-style: italic;
        }

        /* Work Experience */
        .experience-item {
            margin-bottom: 18px;
            page-break-inside: avoid;
        }

        .experience-header {
            margin-bottom: 6px;
        }

        .position {
            font-size: 12pt;
            font-weight: 700;
            color: #000;
            display: inline;
        }

        .company {
            font-size: 11pt;
            font-weight: 600;
            color: #333;
            display: inline;
        }

        .company::before {
            content: " at ";
            font-weight: 400;
        }

        .experience-meta {
            font-size: 10pt;
            color: #555;
            margin-top: 3px;
        }

        .date {
            font-weight: 600;
            display: inline-block;
        }

        .location {
            display: inline-block;
            margin-left: 15px;
        }

        .responsibilities {
            margin-left: 20px;
            margin-top: 6px;
        }

        .responsibilities li {
            margin-bottom: 4px;
            line-height: 1.5;
            font-size: 10.5pt;
            color: #333;
        }

        /* Education */
        .education-item {
            margin-bottom: 15px;
            page-break-inside: avoid;
        }

        .degree {
            font-size: 11.5pt;
            font-weight: 700;
            color: #000;
            display: inline;
        }

        .institution {
            font-size: 11pt;
            color: #333;
            font-weight: 600;
            display: inline;
        }

        .institution::before {
            content: ", ";
        }

        .education-meta {
            font-size: 10pt;
            color: #555;
            margin-top: 3px;
        }

        .gpa {
            font-size: 10pt;
            color: #555;
            margin-top: 3px;
        }

        /* Skills */
        .skills-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 10.5pt;
            color: #333;
            line-height: 1.6;
        }

        .skill {
            display: inline-block;
            padding: 4px 10px;
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 3px;
            font-size: 10pt;
            color: #333;
        }

        /* Certifications */
        .certification-item {
            margin-bottom: 6px;
            font-size: 10.5pt;
            color: #333;
        }

        .certification-item strong {
            color: #000;
        }

        /* Projects */
        .project-item {
            margin-bottom: 15px;
            page-break-inside: avoid;
        }

        .project-name {
            font-size: 11.5pt;
            font-weight: 700;
            color: #000;
            margin-bottom: 4px;
        }

        .project-description {
            font-size: 10.5pt;
            color: #333;
            margin-bottom: 4px;
            line-height: 1.5;
        }

        .technologies {
            font-size: 10pt;
            color: #555;
            margin-bottom: 3px;
        }

        .project-link {
            font-size: 9.5pt;
            color: #555;
        }

        /* Print Optimization */
        @media print {
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Header -->
    <div class="header">
        <h1>{{name}}</h1>
        <div class="contact-info">
            {{contact_info}}
        </div>
    </div>

    <!-- Summary -->
    <div class="section">
        <h2 class="section-title">Professional Summary</h2>
        <p class="summary">{{summary}}</p>
    </div>

    <!-- Work Experience -->
    <div class="section">
        <h2 class="section-title">Professional Experience</h2>
        {{work_experience}}
    </div>

    <!-- Education -->
    <div class="section">
        <h2 class="section-title">Education</h2>
        {{education}}
    </div>

    <!-- Skills -->
    <div class="section">
        <h2 class="section-title">Technical Skills</h2>
        <div class="skills-container">
            {{skills}}
        </div>
    </div>

    {{certifications_section}}

    {{projects_section}}
</div>
</body>
</html>
