<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Resume</title>
    <style>
        @page {
            size: Letter;
            margin: 0.5in;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            color: #1e293b;
            font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            line-height: 1.5;
        }

        .container {
            width: auto;
            min-height: 0;
            margin: 0;
            padding: 0;
            background: #ffffff;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 4px solid #4f46e5;
        }

        .header h1 {
            font-size: 32pt;
            font-weight: 900;
            color: #1e293b;
            margin-bottom: 8px;
            letter-spacing: -0.05em;
            line-height: 1;
        }

        .contact-info {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            column-gap: 24px;
            row-gap: 0;
            font-size: 10.5pt;
            font-weight: 500;
            color: #64748b;
            text-align: center;
        }

        .contact-item {
            display: block;
            white-space: nowrap;
        }

        .section {
            margin-bottom: 18px;
        }

        .section:last-child {
            margin-bottom: 0;
        }

        .section-title {
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid #f1f5f9;
            font-size: 14pt;
            line-height: 1.25;
            font-weight: 800;
            color: #4f46e5;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        .summary {
            margin-bottom: 0;
            font-size: 11pt;
            line-height: 1.625;
            color: #475569;
            text-align: justify;
            white-space: pre-wrap;
            overflow-wrap: break-word;
        }

        .education-item,
        .project-item {
            break-inside: avoid;
            page-break-inside: avoid;
        }

        .experience-item {
            margin-bottom: 24px;
        }

        .experience-item:last-child,
        .education-item:last-child,
        .certification-item:last-child,
        .project-item:last-child {
            margin-bottom: 0;
        }

        .experience-header,
        .education-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            width: 100%;
        }

        .experience-header {
            break-inside: avoid;
            page-break-inside: avoid;
            break-after: avoid;
            page-break-after: avoid;
            margin-bottom: 8px;
        }

        .experience-primary,
        .education-primary {
            min-width: 0;
            flex: 1 1 auto;
        }

        .experience-meta,
        .education-meta {
            flex: 0 0 auto;
            text-align: right;
            padding-left: 16px;
            white-space: nowrap;
        }

        .position {
            margin-bottom: 0;
            font-size: 13pt;
            line-height: 1.333333;
            font-weight: 700;
            color: #1e293b;
            letter-spacing: -0.02em;
        }

        .company {
            font-size: 11.5pt;
            font-weight: 600;
            color: #4f46e5;
        }

        .date {
            font-size: 10pt;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .location {
            font-size: 10pt;
            color: #94a3b8;
        }

        .responsibilities {
            margin-top: 8px;
            margin-left: 24px;
            padding-left: 0;
        }

        .responsibilities li {
            margin-bottom: 8px;
            padding-left: 4px;
            font-size: 10.5pt;
            line-height: 1.625;
            color: #475569;
        }

        .responsibilities li:last-child {
            margin-bottom: 0;
        }

        .education-item {
            margin-bottom: 16px;
        }

        .degree {
            margin-bottom: 0;
            font-size: 12pt;
            line-height: 1.333333;
            font-weight: 700;
            color: #1e293b;
        }

        .institution {
            font-size: 11pt;
            font-weight: 500;
            color: #64748b;
        }

        .gpa {
            font-size: 10pt;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .skills-container {
            display: flex;
            flex-wrap: wrap;
            margin: 0 -10px -10px 0;
        }

        .skill {
            display: inline-block;
            margin: 0 10px 10px 0;
            padding: 6px 16px;
            background: #f1f5f9;
            color: #475569;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 10pt;
            font-weight: 600;
            line-height: 1.2;
        }

        .certification-item {
            margin-bottom: 12px;
            font-size: 10.5pt;
            line-height: 1.6;
            color: #475569;
        }

        .certification-item strong {
            color: #1e293b;
        }

        .project-item {
            margin-bottom: 18px;
        }

        .project-name {
            font-size: 12pt;
            font-weight: 700;
            color: #1e293b;
        }

        .project-description {
            margin-top: 6px;
            font-size: 10.5pt;
            line-height: 1.625;
            color: #475569;
        }

        .technologies,
        .project-link {
            margin-top: 6px;
            font-size: 10pt;
            line-height: 1.5;
            color: #64748b;
        }

        .technologies strong {
            color: #4f46e5;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>{{name}}</h1>
        <div class="contact-info">{{contact_entries}}</div>
    </div>

    {{summary_section}}
    {{work_experience_section}}
    {{education_section}}
    {{skills_section}}
    {{certifications_section}}
    {{projects_section}}
</div>
</body>
</html>
