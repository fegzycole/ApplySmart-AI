<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Resume</title>
    <style>
        @page {
            size: Letter;
            margin: 0.83in;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            color: #18181b;
            font-family: 'EB Garamond', 'Times New Roman', serif;
            line-height: 1.5;
        }

        .container {
            width: auto;
            min-height: 0;
            margin: 0;
            padding: 0;
            background: #ffffff;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            margin-bottom: 16px;
            font-size: 28pt;
            line-height: 0.9;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: #18181b;
            text-transform: uppercase;
        }

        .contact-info {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            column-gap: 24px;
            row-gap: 0;
            font-size: 10.5pt;
            font-weight: 500;
            color: #3f3f46;
            letter-spacing: 0.04em;
            text-align: center;
        }

        .contact-item {
            display: block;
            white-space: nowrap;
        }

        .header-rule {
            width: 100%;
            height: 2px;
            margin-top: 24px;
            background: #18181b;
        }

        .section {
            margin-bottom: 32px;
        }

        .section:last-child {
            margin-bottom: 0;
        }

        .section-title {
            margin-bottom: 16px;
            padding-bottom: 4px;
            border-bottom: 2px solid #27272a;
            font-size: 12pt;
            line-height: 1.25;
            font-weight: 700;
            color: #18181b;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            page-break-after: avoid;
            page-break-inside: avoid;
        }

        .section-title + .summary,
        .section-title + .skills-container,
        .section-title + .experience-item,
        .section-title + .education-item,
        .section-title + .certification-item,
        .section-title + .project-item {
            page-break-before: avoid;
        }

        .summary {
            margin-bottom: 0;
            font-size: 11.5pt;
            line-height: 1.625;
            color: #18181b;
            text-align: justify;
            font-style: italic;
            white-space: pre-wrap;
            overflow-wrap: break-word;
        }

        .education-item,
        .project-item {
            break-inside: avoid;
            page-break-inside: avoid;
        }

        .experience-item {
            margin-bottom: 24px;
        }

        .experience-item:last-child,
        .education-item:last-child,
        .certification-item:last-child,
        .project-item:last-child {
            margin-bottom: 0;
        }

        .experience-company-row,
        .experience-role-row,
        .education-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            width: 100%;
        }

        .experience-company-row,
        .experience-role-row {
            break-inside: avoid;
            page-break-inside: avoid;
            break-after: avoid;
            page-break-after: avoid;
        }

        .experience-company-row {
            margin-bottom: 4px;
        }

        .experience-role-row {
            margin-bottom: 12px;
        }

        .company {
            font-size: 12pt;
            font-weight: 700;
            color: #18181b;
            text-transform: uppercase;
            letter-spacing: -0.01em;
            min-width: 0;
            flex: 1 1 auto;
        }

        .date {
            flex: 0 0 auto;
            text-align: right;
            white-space: nowrap;
            font-size: 10.5pt;
            font-weight: 700;
            color: #27272a;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        .position {
            font-size: 11pt;
            font-weight: 600;
            color: #27272a;
            font-style: italic;
            min-width: 0;
            flex: 1 1 auto;
        }

        .location {
            flex: 0 0 auto;
            text-align: right;
            white-space: nowrap;
            font-size: 10pt;
            font-weight: 500;
            color: #52525b;
            font-style: italic;
        }

        .responsibilities {
            margin-left: 24px;
            padding-left: 0;
        }

        .responsibilities li {
            margin-bottom: 6px;
            padding-left: 4px;
            font-size: 11pt;
            line-height: 1.625;
            color: #18181b;
        }

        .responsibilities li:last-child {
            margin-bottom: 0;
        }

        .education-item {
            margin-bottom: 16px;
        }

        .education-primary,
        .education-meta {
            vertical-align: top;
        }

        .education-primary {
            min-width: 0;
            flex: 1 1 auto;
        }

        .education-meta {
            flex: 0 0 auto;
            margin-left: 24px;
        }

        .institution {
            display: block;
            font-size: 11.5pt;
            font-weight: 700;
            color: #18181b;
            text-transform: uppercase;
        }

        .degree {
            display: block;
            font-size: 11pt;
            font-weight: 600;
            color: #27272a;
            font-style: italic;
        }

        .skills-container {
            margin-bottom: 0;
            font-size: 11.5pt;
            line-height: 1.625;
            color: #18181b;
            font-weight: 500;
            letter-spacing: 0.04em;
        }

        .skill {
            display: inline;
        }

        .skill::after {
            content: " • ";
        }

        .skill:last-child::after {
            content: "";
        }

        .certification-item {
            margin-bottom: 10px;
            font-size: 11pt;
            line-height: 1.6;
            color: #18181b;
        }

        .certification-item strong,
        .project-name {
            color: #18181b;
            font-weight: 700;
        }

        .project-item {
            margin-bottom: 18px;
        }

        .project-name {
            font-size: 11.5pt;
            text-transform: uppercase;
        }

        .project-description {
            margin-top: 6px;
            font-size: 11pt;
            line-height: 1.625;
            color: #18181b;
        }

        .technologies,
        .project-link {
            margin-top: 6px;
            font-size: 10.5pt;
            line-height: 1.5;
            color: #3f3f46;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>{{name}}</h1>
        <div class="contact-info">{{contact_entries}}</div>
        <div class="header-rule"></div>
    </div>

    {{summary_section}}
    {{work_experience_section}}
    {{education_section}}
    {{skills_section}}
    {{certifications_section}}
    {{projects_section}}
</div>
</body>
</html>
