<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Resume</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Calibri', 'Arial', sans-serif;
            font-size: 11pt;
            line-height: 1.4;
            color: #000;
            background: white;
        }

        .container {
            max-width: 8.5in;
            margin: 0 auto;
            padding: 0.5in 0.75in;
        }

        /* Header Section */
        .header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        .header h1 {
            font-size: 20pt;
            font-weight: 700;
            color: #000;
            margin-bottom: 8px;
        }

        .contact-info {
            font-size: 10pt;
            color: #000;
            line-height: 1.3;
        }

        .contact-info span {
            display: inline-block;
        }

        .contact-info span:not(:last-child)::after {
            content: " | ";
            margin: 0 8px;
        }

        /* Section Styles */
        .section {
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 12pt;
            font-weight: 700;
            color: #000;
            margin-bottom: 8px;
            text-transform: uppercase;
            border-bottom: 1px solid #000;
            padding-bottom: 2px;
        }

        /* Summary */
        .summary {
            font-size: 10.5pt;
            line-height: 1.5;
            color: #000;
            text-align: justify;
        }

        /* Work Experience */
        .experience-item {
            margin-bottom: 15px;
            page-break-inside: avoid;
        }

        .experience-header {
            margin-bottom: 4px;
        }

        .position {
            font-size: 11.5pt;
            font-weight: 700;
            color: #000;
        }

        .company {
            font-size: 11pt;
            font-weight: 600;
            color: #000;
        }

        .experience-meta {
            font-size: 10pt;
            color: #000;
            margin-bottom: 4px;
        }

        .date {
            font-weight: 600;
        }

        .location {
            margin-left: 10px;
        }

        .responsibilities {
            margin-left: 18px;
            margin-top: 5px;
        }

        .responsibilities li {
            margin-bottom: 3px;
            line-height: 1.4;
            font-size: 10.5pt;
            color: #000;
        }

        /* Education */
        .education-item {
            margin-bottom: 12px;
            page-break-inside: avoid;
        }

        .education-header {
            margin-bottom: 3px;
        }

        .degree {
            font-size: 11.5pt;
            font-weight: 700;
            color: #000;
        }

        .institution {
            font-size: 11pt;
            color: #000;
            font-weight: 600;
        }

        .education-meta {
            font-size: 10pt;
            color: #000;
        }

        .gpa {
            font-size: 10pt;
            color: #000;
            margin-top: 2px;
        }

        /* Skills */
        .skills-container {
            font-size: 10.5pt;
            color: #000;
            line-height: 1.5;
        }

        .skill {
            display: inline;
        }

        .skill::after {
            content: ", ";
        }

        .skill:last-child::after {
            content: "";
        }

        /* Certifications */
        .certification-item {
            margin-bottom: 5px;
            font-size: 10.5pt;
            color: #000;
        }

        .certification-item strong {
            font-weight: 700;
        }

        /* Projects */
        .project-item {
            margin-bottom: 12px;
            page-break-inside: avoid;
        }

        .project-name {
            font-size: 11.5pt;
            font-weight: 700;
            color: #000;
            margin-bottom: 3px;
        }

        .project-description {
            font-size: 10.5pt;
            color: #000;
            margin-bottom: 3px;
            line-height: 1.4;
        }

        .technologies {
            font-size: 10pt;
            color: #000;
        }

        .project-link {
            font-size: 10pt;
            color: #000;
        }

        /* Print Optimization */
        @media print {
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Header -->
    <div class="header">
        <h1>{{name}}</h1>
        <div class="contact-info">
            <span>{{email}}</span>
            <span>{{phone}}</span>
            <span>{{location}}</span>
        </div>
        <div class="contact-info" style="margin-top: 3px;">
            <span>{{linkedin}}</span>
            <span>{{github}}</span>
            <span>{{website}}</span>
        </div>
    </div>

    <!-- Summary -->
    <div class="section">
        <h2 class="section-title">Summary</h2>
        <p class="summary">{{summary}}</p>
    </div>

    <!-- Work Experience -->
    <div class="section">
        <h2 class="section-title">Work Experience</h2>
        {{work_experience}}
    </div>

    <!-- Education -->
    <div class="section">
        <h2 class="section-title">Education</h2>
        {{education}}
    </div>

    <!-- Skills -->
    <div class="section">
        <h2 class="section-title">Skills</h2>
        <div class="skills-container">
            {{skills}}
        </div>
    </div>

    <!-- Certifications -->
    <div class="section">
        <h2 class="section-title">Certifications</h2>
        {{certifications}}
    </div>

    <!-- Projects -->
    <div class="section">
        <h2 class="section-title">Projects</h2>
        {{projects}}
    </div>
</div>
</body>
</html>
